SUITE: "Simple setup and destroy cluster"

DESCRIPTION: "Example suite does a setup then destroy of a cluster tests"

TESTLIST:
    - TESTCASE: Setup Cluster
      DESC: "Does an optional checkout & build, then a install and start"
      TESTGROUP: example_tests     
      TESTFILE: setup.py            
      CASE_ARGS:                     
        - do_build: false
      
    - TESTCASE: Destroy Cluster
      DESC: "Does a stop and uninstall"
      TESTGROUP: example_tests     
      TESTFILE: destroy.py          
    
